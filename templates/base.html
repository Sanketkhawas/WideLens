<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>
        {% block title %}
            AI Business Expansion Advisor
        {% endblock %}
    </title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/style.css') }}">

    {% block head %}
    {% endblock %}

</head>

<body>

    <div class="container">

        <div class="auth-card">

            {% with messages = get_flashed_messages(with_categories=true) %}

                {% if messages %}

                    {% for category, message in messages %}

                        <div class="flash {{ category }}">
                            {{ message }}
                        </div>

                    {% endfor %}

                {% endif %}

            {% endwith %}

            {% block content %}
            {% endblock %}

        </div>

    </div>

    {% block scripts %}
    {% endblock %}

</body>

</html>
